# Custom directed tests that are local to this checkout.
#
# This file is read by scripts/metadata.py in addition to directed_testlist.yaml.
# It is not generated by gen_testlist.py, so local custom tests can be added here
# without being overwritten when directed_testlist.yaml is regenerated.
#
# - All paths are relative to THIS FILE.
# - Each test can specify a config by name to re-use common configuration.
# - If a test redefines a key already in the config, the test option takes priority.

- config: custom-riscv-tests
  ld_script: link.ld
  includes: .
  gcc_opts: -march=rv32imc_zicsr -mabi=ilp32
            -static -mcmodel=medany -fvisibility=hidden -nostdlib -nostartfiles
            -I../../../vendor/riscv-test-env/
            -I../../../vendor/riscv-test-env/p/
            -I../../../vendor/riscv-tests/isa/macros/scalar/
  rtl_test: core_ibex_base_test
  rtl_params:
    PMPEnable: [0, 1]
  timeout_s: 300

- config: custom-rv32i-tests
  ld_script: link.ld
  includes: .
  gcc_opts: -march=rv32i_zicsr_zifencei -mabi=ilp32
            -static -mcmodel=medany -fvisibility=hidden -nostdlib -nostartfiles
            -I../../../vendor/riscv-test-env/
            -I../../../vendor/riscv-test-env/p/
            -I../../../vendor/riscv-tests/isa/macros/scalar/
  rtl_test: core_ibex_base_test
  rtl_params:
    PMPEnable: [0, 1]
  timeout_s: 300

- config: custom-rv32i-arithmetic-tests
  ld_script: link.ld
  includes: .
  gcc_opts: -march=rv32i -mabi=ilp32
            -static -mcmodel=medany -fvisibility=hidden -nostdlib -nostartfiles
  rtl_test: core_ibex_base_test
  rtl_params:
    PMPEnable: [0, 1]
  timeout_s: 300

- config: custom-rv32m-tests
  ld_script: link.ld
  includes: .
  gcc_opts: -march=rv32im -mabi=ilp32
            -static -mcmodel=medany -fvisibility=hidden -nostdlib -nostartfiles
  rtl_test: core_ibex_base_test
  rtl_params:
    PMPEnable: [0, 1]
  timeout_s: 300

- config: custom-rv32c-tests
  ld_script: link.ld
  includes: .
  gcc_opts: -march=rv32ic_zicsr -mabi=ilp32
            -static -mcmodel=medany -fvisibility=hidden -nostdlib -nostartfiles
  rtl_test: core_ibex_base_test
  rtl_params:
    PMPEnable: [0, 1]
  timeout_s: 300

- config: custom-rv32imc-tests
  ld_script: link.ld
  includes: .
  gcc_opts: -march=rv32imc_zicsr -mabi=ilp32
            -static -mcmodel=medany -fvisibility=hidden -nostdlib -nostartfiles
  rtl_test: core_ibex_base_test
  rtl_params:
    PMPEnable: [0, 1]
  timeout_s: 300

- test: custom_empty
  desc: >
    Example custom directed test. Replace test_srcs with your own assembly file
    or copy this entry to add more local tests.
  iterations: 1
  test_srcs: custom_assembly_riscv/empty.S
  config: custom-riscv-tests

- test: rv32i
  desc: >
    Custom shuffled RV32I directed test with ten instances of each primary
    RV32I mnemonic and varied register, PC, and memory-address usage.
  iterations: 1
  test_srcs: custom_assembly_riscv/rv32i.S
  config: custom-rv32i-tests

- test: rv32i_arithmetic
  desc: >
    Custom shuffled RV32I arithmetic/logic/shift directed test with twenty
    source-level instances of each arithmetic mnemonic and varied x0, source,
    destination, and immediate usage.
  iterations: 1
  test_srcs: custom_assembly_riscv/rv32i_arithmetic.s
  config: custom-rv32i-arithmetic-tests

- test: rv32m
  desc: >
    Custom shuffled RV32M directed test with ten source-level instances of each
    multiply/divide/remainder mnemonic and full x0..x31 register coverage.
  iterations: 1
  test_srcs: custom_assembly_riscv/rv32m.S
  config: custom-rv32m-tests

- test: rv32c
  desc: >
    Custom shuffled RV32C/Zca directed test with ten source-level instances of
    each compressed integer mnemonic and varied compressed register/immediate
    usage.
  iterations: 1
  test_srcs: custom_assembly_riscv/rv32c.s
  config: custom-rv32c-tests

- test: rv32imc
  desc: >
    Custom mixed RV32IMC directed test with 70 RV32I, 70 RV32M, and 70 RV32C
    body instructions arranged across varied 16-bit/32-bit memory packing
    patterns.
  iterations: 1
  test_srcs: custom_assembly_riscv/rv32imc.S
  config: custom-rv32imc-tests

- test: load_store
  desc: >
    Custom RV32I load/store directed test with twenty source-level instances of
    each lb, lh, lw, lbu, lhu, sb, sh, and sw mnemonic over varied aligned and
    byte-granular offsets.
  iterations: 1
  test_srcs: custom_assembly_riscv/load_store.S
  config: custom-rv32i-tests

- test: CSR
  desc: >
    Custom RV32I/Zicsr directed test with twenty source-level instances of each
    csrrw, csrrs, csrrc, csrrwi, csrrsi, and csrrci CSR instruction form.
  iterations: 1
  test_srcs: custom_assembly_riscv/CSR.S
  config: custom-rv32i-tests

- test: RAW_hazard
  desc: >
    Custom RV32IM directed RAW hazard stress test with around 200 body
    instructions covering chained ALU, mul/div, load-use, store-data, and
    store-address dependencies.
  iterations: 1
  test_srcs: custom_assembly_riscv/RAW_hazard.s
  config: custom-rv32m-tests
